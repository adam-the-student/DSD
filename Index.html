<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OR Hallway Compliance Monitor</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --border-color: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.25rem;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
        }

        .card-label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0;
            word-break: break-word;
        }

        /* Status-specific highlight rules */
        .status-initializing { color: var(--text-muted); }
        .status-scanning { color: var(--accent-blue); }
        .status-detected { color: var(--accent-green); }
        .status-violation { color: #ef4444; }
        .status-warning { color: #f59e0b; }

        .system-footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: auto;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-green);
            margin-right: 6px;
            box-shadow: 0 0 8px var(--accent-green);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>OR Hallway Control Center</h1>
            <p class="subtitle">Real-Time Two-Stage ID & Compliance Monitor</p>
        </header>

        <main>
            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-label">Compliance Status</div>
                    <div id="badge-status" class="card-value status-initializing">CONNECTING...</div>
                </div>

                <div class="card">
                    <div class="card-label">Distance Status</div>
                    <div id="distance-status" class="card-value">SEARCHING</div>
                </div>

                <div class="card">
                    <div class="card-label">Estimated Distance</div>
                    <div id="estimated-ft" class="card-value">0.0 <span style="font-size: 1.25rem; font-weight: 400; color: var(--text-muted);">ft</span></div>
                </div>
            </div>
        </main>

        <footer class="system-footer">
            <span class="indicator"></span> Live Data Link Active over Secure WebSockets
        </footer>
    </div>

    <script>
        // Establish the persistent asynchronous tracking telemetry link
        const socketUrl = `ws://${window.location.host}/ws`;
        let socket = new WebSocket(socketUrl);

        const badgeStatusEl = document.getElementById("badge-status");
        const distanceStatusEl = document.getElementById("distance-status");
        const estimatedFtEl = document.getElementById("estimated-ft");

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);

            // 1. Map and color-code the State Machine's variable outputs
            badgeStatusEl.innerText = data.badge_status;
            
            // Strip classes and re-apply styling hooks contextually
            badgeStatusEl.className = "card-value"; 
            if (data.badge_status.includes("INITIALIZING")) {
                badgeStatusEl.classList.add("status-initializing");
            } else if (data.badge_status.includes("SCANNING") || data.badge_status.includes("CALCULATING")) {
                badgeStatusEl.classList.add("status-scanning");
            } else if (data.badge_status.includes("BADGE DETECTED")) {
                badgeStatusEl.classList.add("status-detected");
            } else if (data.badge_status.includes("NO BADGE DETECTED") || data.badge_status.includes("ALERT")) {
                badgeStatusEl.classList.add("status-violation");
            } else {
                badgeStatusEl.classList.add("status-warning");
            }

            // 2. Map Volumetric Distance Gates
            distanceStatusEl.innerText = data.distance_status;
            distanceStatusEl.className = "card-value";
            if (data.distance_status === "OK") {
                distanceStatusEl.classList.add("status-detected");
            } else if (data.distance_status === "SEARCHING") {
                distanceStatusEl.classList.add("status-initializing");
            } else {
                distanceStatusEl.classList.add("status-warning"); // Too Close or Too Far alerts
            }

            // 3. Map Depth Field Calculations
            estimatedFtEl.innerHTML = `${data.estimated_ft.toFixed(1)} <span style="font-size: 1.25rem; font-weight: 400; color: var(--text-muted);">ft</span>`;
        };

        socket.onclose = function() {
            badgeStatusEl.innerText = "LINK DROPPED";
            badgeStatusEl.className = "card-value status-violation";
            console.log("WebSocket connection dropped. Attempting reload sequence...");
            setTimeout(() => { window.location.reload(); }, 3000);
        };

        socket.onerror = function(error) {
            console.error(`WebSocket Interface Exception: ${error}`);
        };
    </script>
</body>
</html>
