<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSD Security Access Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.4s ease;
        }
        h1 { margin-bottom: 5px; color: #ffffff; }
        .container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #1d1d22;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #29292e;
        }
        .full-width { grid-column: span 2; }
        .metric-label { font-size: 0.9rem; color: #8d8d99; text-transform: uppercase; letter-spacing: 1px; }
        .metric-value { font-size: 2.2rem; font-weight: bold; margin-top: 10px; text-align: center; }
        
        /* Highlight styling for the new counter card */
        .counter-card {
            background: linear-gradient(145deg, #1d1d22, #141417);
            border-left: 5px solid #00ff66;
        }
        .counter-value {
            color: #00ff66;
            font-size: 3rem;
        }

        /* Status Banner State Engine Styles */
        #status-card { transition: all 0.3s ease; }
        .state-SCANNING { background-color: #1d1d22; color: #e1e1e6; }
        .state-BADGE { background-color: #1b4d22; color: #afffaf; border-color: #2e7d32; }
        .state-NO-BADGE { background-color: #661a1a; color: #ffb3b3; border-color: #c62828; }
        .state-ALERT { background-color: #b36b00; color: #ffe6cc; border-color: #ef6c00; }

        #log-box {
            width: 100%;
            height: 120px;
            background-color: #09090a;
            border-radius: 6px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            overflow-y: auto;
            color: #8d8d99;
            box-sizing: border-box;
            border: 1px solid #29292e;
            margin-top: 10px;
        }
        
        /* New Historical Table Styles */
        .table-container {
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #29292e;
            border-radius: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }
        th {
            background-color: #141417;
            color: #8d8d99;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #29292e;
            background-color: #1d1d22;
        }
        tr:last-child td { border-bottom: none; }
        .badge-tag {
            background-color: rgba(27, 77, 34, 0.4);
            color: #50fa7b;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .network-tag { font-size: 0.8rem; color: #6272a4; margin-top: 5px; }
    </style>
</head>
<body class="state-SCANNING">

    <h1>Doorway Security Monitor</h1>
    <div class="network-tag" id="net-status">Connecting to Wall Pi WebSocket...</div>

    <div class="container">
        
        <div class="card full-width counter-card">
            <div class="metric-label">Total Valid Room Entries</div>
            <div class="metric-value counter-value" id="total-entries-count">0</div>
        </div>

        <div class="card full-width" id="status-card">
            <div class="metric-label">Access Authorization Status</div>
            <div class="metric-value" id="badge-status">INITIALIZING SYSTEM</div>
        </div>

        <div class="card">
            <div class="metric-label">Target Distance</div>
            <div class="metric-value" id="distance-value">0.0 ft</div>
        </div>

        <div class="card">
            <div class="metric-label">Zone State</div>
            <div class="metric-value" id="zone-status">SEARCHING...</div>
        </div>

        <div class="card full-width">
            <div style="align-self: flex-start;" class="metric-label">Live Diagnostic Feed</div>
            <div id="log-box"></div>
        </div>

        <div class="card full-width" style="align-items: stretch;">
            <div class="metric-label" style="margin-bottom: 5px;">Historical Room Entry Ledger</div>
            <div class="table-container">
                <table id="entry-ledger">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Event Profile</th>
                            <th>Max Confidence</th>
                            <th>Proximity</th>
                        </tr>
                    </thead>
                    <tbody id="ledger-body">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const logBox = document.getElementById('log-box');
        const netStatus = document.getElementById('net-status');
        const statusCard = document.getElementById('status-card');
        const ledgerBody = document.getElementById('ledger-body');
        const counterElement = document.getElementById('total-entries-count');
        
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        let lastLoggedStatus = "";
        let verifiedEntryCount = 0;

        ws.onopen = () => {
            netStatus.textContent = `Connected Live to Wall Pi Frame Server @ ${window.location.host}`;
            netStatus.style.color = "#50fa7b";
            addLog("System Link Established. Fetching data pipeline telemetry...");
        };

        ws.onclose = () => {
            netStatus.textContent = "Disconnected from Wall Pi Server. Retrying link...";
            netStatus.style.color = "#ff5555";
            addLog("SYSTEM WARNING: Network WebSocket Connection Interrupted.");
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // 1. Process Standard Real-Time Frame Telemetry
            document.getElementById('badge-status').textContent = data.badge_status.toUpperCase();
            document.getElementById('distance-value').textContent = `${data.estimated_ft.toFixed(1)} ft`;
            document.getElementById('zone-status').textContent = data.distance_status;

            // Dynamically Swap UI Colors Based on System State Match Flags
            statusCard.className = "card full-width"; 
            if (data.distance_status !== "OK") {
                statusCard.classList.add("state-ALERT");
            } else if (data.badge_status.includes("BADGE DETECTED")) {
                statusCard.classList.add("state-BADGE");
            } else if (data.badge_status.includes("NO BADGE DETECTED")) {
                statusCard.classList.add("state-NO-BADGE");
            } else {
                statusCard.classList.add("state-SCANNING");
            }

            // Clean Logging Logic for Diagnostic Feed Window
            if (data.badge_status !== lastLoggedStatus && !data.badge_status.includes("SCANNING")) {
                addLog(`[DIAG] State shift: ${data.badge_status}`);
                lastLoggedStatus = data.badge_status;
            }

            // 2. NEW FEATURE: Listen for discrete entry pulses fired from the state machine backend
            if (data.is_entry_event === true) {
                // Increment HTML UI Counter metric
                verifiedEntryCount++;
                counterElement.textContent = verifiedEntryCount;
                
                // Append historical metadata details right into the ledger view
                addLedgerRow(data.event_time, data.max_confidence, data.min_distance);
            }
        };

        function addLog(message) {
            const timestamp = new Date().toLocaleTimeString();
            logBox.innerHTML += `[${timestamp}] ${message}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function addLedgerRow(time, confidence, distance) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${time}</td>
                <td><span class="badge-tag">Valid Badge Entry</span></td>
                <td>${confidence}%</td>
                <td>${distance.toFixed(1)} ft</td>
            `;
            // Insert newest rows at the very top of the ledger list
            ledgerBody.insertBefore(row, ledgerBody.firstChild);
        }
    </script>
</body>
</html>
