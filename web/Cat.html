<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        li {
            font-size:  50px;

        }
    </style>
    <title>Tamagotchi Cat Vitals</title>
</head>
<body>

    <h1>MONITOR</h1>
    <hr>

    <h2>Readout:</h2>
    <ul>
        <!--<li><strong>Pet Status:</strong> <span id="pet_status">LOADING...</span></li> Pet status dont really want to show that rn lol -->
        <li><strong>Successful Dosimeter IDs today:</strong> <span id="successful_feedings">0</span></li>
        <li><strong>Daily Baseline Goal:</strong> <span id="daily_goal">0</span></li>
    </ul>

    <hr>
    <h3>System Debug Connection State: <span id="ws_status">Disconnected</span></h3>

    <script>
        // Connect to the existing master pipeline WebSocket stream
        const socket = new WebSocket(`ws://${window.location.host}/ws`);

        socket.onopen = function(e) {
            document.getElementById('ws_status').innerText = "Connected";
            document.getElementById('ws_status').style.color = "green";
        };

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);

            // 🟢 Handle History: If it's a history payload array, grab the last entry snapshot
            let snapshot = data;
            if (data.is_startup_history && Array.isArray(data.history) && data.history.length > 0) {
                snapshot = data.history[data.history.length - 1];
            } else if (data.is_startup_history) {
                return; // Skip empty history arrays
            }

            // 🟢 Safe Dom Checks: Verify elements exist before attempting text manipulation updates
            const petStatusEl = document.getElementById('pet_status');
            const feedingsEl = document.getElementById('successful_feedings');
            const goalEl = document.getElementById('daily_goal');

            if (snapshot.pet_status !== undefined && petStatusEl) {
                petStatusEl.innerText = snapshot.pet_status;
            }
            if (snapshot.successful_feedings !== undefined && feedingsEl) {
                feedingsEl.innerText = snapshot.successful_feedings;
            }
            if (snapshot.daily_goal !== undefined && goalEl) {
                goalEl.innerText = snapshot.daily_goal;
            }
        };

        socket.onclose = function(e) {
            document.getElementById('ws_status').innerText = "Disconnected / Pipeline Offline";
            document.getElementById('ws_status').style.color = "red";
        };

        socket.onerror = function(error) {
            console.error(`WebSocket Error: ${error.message}`);
        };
    </script>
</body>
</html>
