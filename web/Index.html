<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSD Access Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.4s ease;
        }
        h1 { margin-bottom: 5px; color: #ffffff; }
        .container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #1d1d22;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #29292e;
        }
        .full-width { grid-column: span 2; }
        .metric-label { font-size: 0.9rem; color: #8d8d99; text-transform: uppercase; letter-spacing: 1px; }
        .metric-value { font-size: 2.2rem; font-weight: bold; margin-top: 10px; text-align: center; }
        
        /* Highlight styling for the counter card */
        .counter-card {
            background: linear-gradient(145deg, #1d1d22, #141417);
            border-left: 5px solid #00ff66;
        }
        .counter-value {
            color: #00ff66;
            font-size: 3rem;
        }

        /* Camera Remote Control Buttons */
        .control-container {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            width: 100%;
            max-width: 400px;
        }
        .ctrl-btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .start-btn {
            background-color: #2e7d32;
            color: #afffaf;
        }
        .start-btn:hover {
            background-color: #1b5e20;
            box-shadow: 0 0 8px rgba(46, 125, 50, 0.4);
        }
        .stop-btn {
            background-color: #c62828;
            color: #ffb3b3;
        }
        .stop-btn:hover {
            background-color: #b71c1c;
            box-shadow: 0 0 8px rgba(198, 40, 40, 0.4);
        }
        .ctrl-btn:active {
            transform: scale(0.98);
        }

        /* Status Banner State Engine Styles */
        #status-card { transition: all 0.3s ease; }
        .state-SCANNING { background-color: #1d1d22; color: #e1e1e6; }
        .state-BADGE { background-color: #1b4d22; color: #afffaf; border-color: #2e7d32; }
        .state-NO-BADGE { background-color: #661a1a; color: #ffb3b3; border-color: #c62828; }
        .state-ALERT { background-color: #b36b00; color: #ffe6cc; border-color: #ef6c00; }

        #log-box {
            width: 100%;
            height: 120px;
            background-color: #09090a;
            border-radius: 6px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            overflow-y: auto;
            color: #8d8d99;
            box-sizing: border-box;
            border: 1px solid #29292e;
            margin-top: 10px;
        }
        
        /* Historical Table Styles */
        .table-container {
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #29292e;
            border-radius: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }
        th {
            background-color: #141417;
            color: #8d8d99;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
        }
        td {
            padding: 12px;
            border-bottom: 1px solidg #29292e;
            background-color: #1d1d22;
        }
        tr:last-child td { border-bottom: none; }
        .badge-tag {
            background-color: rgba(27, 77, 34, 0.4);
            color: #50fa7b;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
                /* 🟢 Compliant entries explicitly look green */
        .badge-tag.state-BADGE {
            background-color: rgba(80, 250, 123, 0.15);
            color: #50fa7b;
        }

        /* 🔴 Violations explicitly look red */
        .badge-tag.state-NO-BADGE {
            background-color: rgba(255, 85, 85, 0.15); /* 🟢 Soft red halo background */
            color: #ff5555;                             /* Bright red text color */
        }

        .network-tag { font-size: 0.8rem; color: #6272a4; margin-top: 5px; }
    </style>
</head>
<body class="state-SCANNING">

    <h1>Dosimeter Sensing Device Portal</h1>
    <div class="network-tag" id="net-status">Connecting to DSD WebSocket...</div>

    <div class="container">
        
        <div class="card full-width counter-card">
            <div class="metric-label">Total Valid Room Entries</div>
            <div class="metric-value counter-value" id="total-entries-count">0</div>
            
            <div class="control-container">
            </div>
        </div>

        <div class="card full-width" id="status-card">
            <div class="metric-label">Access Authorization Status</div>
            <div class="metric-value" id="badge-status">INITIALIZING SYSTEM</div>
        </div>

        <div class="card">
            <div class="metric-label">Target Distance</div>
            <div class="metric-value" id="distance-value">0.0 ft</div>
        </div>

        <div class="card">
            <div class="metric-label">Zone State</div>
            <div class="metric-value" id="zone-status">SEARCHING...</div>
        </div>

        <div class="card full-width">
            <div style="align-self: flex-start;" class="metric-label">Live Diagnostic Feed</div>
            <div id="log-box"></div>
        </div>

        <div class="card full-width" style="align-items: stretch;">
            <div class="metric-label" style="margin-bottom: 5px;">Historical Room Entry Ledger</div>
            <div class="table-container">
                <table id="entry-ledger">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Event Profile</th>
                            <th>Max Confidence</th>
                            <th>Proximity</th>
                        </tr>
                    </thead>
                    <tbody id="ledger-body">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="/static/dashboard.js"></script>
</body>
</html>
